name: CI — Landing (alpaso-app)

on:
  push:
    branches: [main, qa]
  pull_request:
    branches: [main, qa]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── JOB 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.meta.outputs.branch }}
      firebase_project: ${{ steps.meta.outputs.firebase_project }}
    steps:
      - name: Checkout landing (${{ github.ref_name }})
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_PRIVATE_KEY: ${{ secrets.VITE_EMAILJS_PRIVATE_KEY }}

      - name: Subir artefacto dist/
        uses: actions/upload-artifact@v4
        with:
          name: dist-landing
          path: dist/
          retention-days: 1

      - name: Determinar Firebase project y rama
        id: meta
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "firebase_project=tunay-wasi" >> "$GITHUB_OUTPUT"
          else
            echo "firebase_project=alpaso-app" >> "$GITHUB_OUTPUT"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  # ─── JOB 2: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy → Firebase (${{ needs.build.outputs.firebase_project }})
    needs: [build]
    runs-on: ubuntu-latest
    # Solo despliega en push directo (no en PRs)
    if: github.event_name == 'push'
    steps:
      - name: Checkout landing
        uses: actions/checkout@v4

      - name: Descargar artefacto dist/
        uses: actions/download-artifact@v4
        with:
          name: dist-landing
          path: dist/

      - name: Deploy a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: >-
            ${{
              needs.build.outputs.firebase_project == 'tunay-wasi'
              && secrets.FIREBASE_SERVICE_ACCOUNT_TUNAY
              || secrets.FIREBASE_SERVICE_ACCOUNT_ALPASO
            }}
          projectId: ${{ needs.build.outputs.firebase_project }}
          channelId: live